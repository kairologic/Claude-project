# nppes-auto-confirmation.yml
#
# Replaces nppes-confirmation-poll.yml
# 
# KEY CHANGE: The old workflow only polled requests with status = SUBMITTED.
# This workflow polls ALL active requests (FORM_GENERATED + SUBMITTED),
# removing the dependency on users clicking "Mark as Submitted".
#
# Schedule: Daily at 10am UTC (same as before)

name: NPPES Auto-Confirmation

on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10am UTC
  workflow_dispatch:        # Manual trigger for testing

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SES_SMTP_HOST: ${{ secrets.SES_SMTP_HOST }}
  SES_SMTP_USER: ${{ secrets.SES_SMTP_USER }}
  SES_SMTP_PASS: ${{ secrets.SES_SMTP_PASS }}
  SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
  NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}

jobs:
  auto-confirmation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run auto-confirmation polling
        run: npx ts-node scripts/run-auto-confirmation.ts

      - name: Report results
        if: always()
        run: |
          echo "Auto-confirmation polling completed at $(date -u)"
          echo "Check the run logs above for detailed results"
