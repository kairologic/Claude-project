# .github/workflows/payer-directory-sync.yml
# ═══ KairoLogic Payer Directory Sync ═══
# Queries active payer FHIR directories for provider listings,
# creates snapshots, and runs cross-source mismatch detection.
#
# Weekly on Thursdays (after Wed scan-and-delta settles).
# Manual dispatch supports per-payer runs and offset pagination.
#
# SELF-CHAINING: When a batch completes and more providers remain,
# the workflow automatically triggers itself with offset += limit.
# Trigger once with offset=0 and it runs through the entire roster.
#
# BCBS TX/CA: Set is_active=true in payer_directory_endpoints
# and add client_id/client_secret to auth_config when ready.
# No code changes needed — the workflow picks up all active endpoints.

name: Payer Directory Sync

on:
  schedule:
    # Every Thursday at 6am UTC (midnight Central Wednesday)
    - cron: '0 6 * * 4'

  workflow_dispatch:
    inputs:
      payer:
        description: 'Payer code (blank = all active payers)'
        required: false
        default: ''
        type: choice
        options:
          - '' # all active payers
          - aetna
          - cigna
          - humana
          - uhc
          - bcbs_tx
          - bcbs_ca
      limit:
        description: 'Max providers per batch (default 5000)'
        required: false
        default: '5000'
      offset:
        description: 'Offset for pagination (default 0)'
        required: false
        default: '0'
      auto_chain:
        description: 'Auto-trigger next batch when done'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  sync:
    name: "Payer Sync (offset ${{ github.event.inputs.offset || '0' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install tsx
        run: npm install -g tsx

      - name: Run payer directory sync
        id: sync
        run: |
          ARGS=""

          LIMIT="${{ github.event.inputs.limit || '5000' }}"
          ARGS="$ARGS --limit $LIMIT"

          OFFSET="${{ github.event.inputs.offset || '0' }}"
          if [ "$OFFSET" != "0" ]; then
            ARGS="$ARGS --offset $OFFSET"
          fi

          PAYER="${{ github.event.inputs.payer || '' }}"
          if [ -n "$PAYER" ]; then
            ARGS="$ARGS --payer $PAYER"
          fi

          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Running: npx tsx scripts/sync-payer-batch.ts $ARGS"
          npx tsx scripts/sync-payer-batch.ts $ARGS 2>&1 | tee /tmp/sync-output.log

          # Check if the batch exhausted all providers
          if grep -q 'BATCH_STATUS=EXHAUSTED' /tmp/sync-output.log; then
            echo "has_more=false" >> $GITHUB_OUTPUT
          else
            echo "has_more=true" >> $GITHUB_OUTPUT
          fi

          echo "limit=$LIMIT" >> $GITHUB_OUTPUT
          echo "offset=$OFFSET" >> $GITHUB_OUTPUT
          NEXT_OFFSET=$((OFFSET + LIMIT))
          echo "next_offset=$NEXT_OFFSET" >> $GITHUB_OUTPUT

      - name: Report
        if: always()
        run: |
          echo "### Payer Directory Sync Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Payer:** ${{ github.event.inputs.payer || 'all active' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Limit:** ${{ github.event.inputs.limit || '5000' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Offset:** ${{ github.event.inputs.offset || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next offset:** ${{ steps.sync.outputs.next_offset }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Auto-chain:** ${{ github.event.inputs.auto_chain || 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run:** ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Completed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY

      - name: Chain next batch
        if: >-
          success() &&
          steps.sync.outputs.has_more == 'true' &&
          github.event.inputs.auto_chain != 'false' &&
          github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_OFFSET=${{ steps.sync.outputs.next_offset }}
          LIMIT=${{ steps.sync.outputs.limit }}
          PAYER="${{ github.event.inputs.payer || '' }}"

          echo "More providers remaining. Triggering next batch: offset=$NEXT_OFFSET, limit=$LIMIT"

          gh workflow run payer-directory-sync.yml \
            -f offset="$NEXT_OFFSET" \
            -f limit="$LIMIT" \
            -f payer="$PAYER" \
            -f auto_chain="true" \
            -f dry_run="false"

          echo "Next batch dispatched (offset=$NEXT_OFFSET)"
