# .github/workflows/nppes-url-import.yml
# ═══ NPPES URL Import ═══
# Imports practice website URLs from NPPES provider data into practice_websites.
# Validates reachability (HEAD → GET) and filters against domain blocklist.
# Manual trigger only.

name: NPPES URL Import

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'State to import (default TX)'
        required: false
        default: 'TX'
      limit:
        description: 'Max URLs to process'
        required: false
        default: '500'
      concurrency:
        description: 'Parallel reachability checks'
        required: false
        default: '10'
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  import:
    name: Import NPPES URLs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci

      - name: Run NPPES URL import
        run: |
          ARGS="--state ${{ github.event.inputs.state || 'TX' }}"
          ARGS="$ARGS --limit ${{ github.event.inputs.limit || '500' }}"
          ARGS="$ARGS --concurrency ${{ github.event.inputs.concurrency || '10' }}"

          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Running: npx tsx scripts/import-nppes-urls.ts $ARGS"
          npx tsx scripts/import-nppes-urls.ts $ARGS
