name: Page Change Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Page Content, Design & Link Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run static content tests
        run: npm run test:content
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Run page structure tests
        run: npm run test:structure
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Run broken link tests
        run: npm run test:links
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Run functionality tests
        run: npm run test:functionality
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Run visual regression tests
        run: npm run test:visual
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshot diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff-results
          path: test-results/
          retention-days: 14
