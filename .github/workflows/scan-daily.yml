# .github/workflows/scan-daily.yml
# ═══ KairoLogic Daily Scan — CVO & Claimed Practices ═══
#
# Lightweight daily scan run targeting high-priority sites:
#   - daily-tier (CVO / shield-enterprise) practices
#   - weekly-tier sites that happen to be due (their scan_scheduled_at <= now)
#   - newly claimed practices (scan_scheduled_at set to now on claim)
#
# This is separate from the main Wednesday scan-and-delta.yml which
# handles the full 57k+ monthly-tier population. This workflow runs
# with a smaller limit to stay fast and cost-effective.
#
# Scheduling rationale:
#   - 6am UTC daily (midnight Central) — after NPPES confirmation poll (10am UTC)
#     settles from the previous day.
#   - Skips Wednesdays to avoid overlapping with the weekly full scan.
#
# The underlying scan-scheduler.ts fetchDueSites() already respects
# scan_tier cadence — this workflow just triggers it more frequently.

name: Daily Scan (Priority Practices)

on:
  schedule:
    # Every day at 6am UTC except Wednesdays (handled by scan-and-delta.yml)
    # GitHub Actions doesn't support "except" in cron, so we run daily
    # and the concurrency group prevents overlap with the Wednesday run.
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      limit:
        description: 'Max sites to scan (default 100)'
        required: false
        default: '100'
      state:
        description: 'State filter (blank = all states)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: kairologic-scan
  cancel-in-progress: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  scan:
    name: Daily Priority Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run scan (due sites only)
        run: |
          LIMIT="${{ github.event.inputs.limit || '100' }}"
          ARGS="--limit $LIMIT"

          STATE="${{ github.event.inputs.state || '' }}"
          if [ -n "$STATE" ]; then
            ARGS="$ARGS --state $STATE"
          fi

          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Running daily priority scan: npx tsx scripts/run-scan-and-delta.ts $ARGS"
          npx tsx scripts/run-scan-and-delta.ts $ARGS

      - name: Report
        if: always()
        run: |
          echo "### Daily Priority Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** Daily priority (CVO + claimed practices)" >> $GITHUB_STEP_SUMMARY
          echo "- **Limit:** ${{ github.event.inputs.limit || '100' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **State:** ${{ github.event.inputs.state || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Completed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
