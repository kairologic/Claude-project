# tmb-newsroom-monitor.yml
#
# Standalone weekly workflow for monitoring TMB disciplinary actions.
# Closes the 30-day ORSSP detection gap by catching emergency suspensions
# and board meeting actions within ~7 days.
#
# Schedule: Every Wednesday at 4am UTC (before the 5am scan-and-delta run)
# This ensures any new license issues are in the DB before the scanner
# checks practice websites, enabling same-day correlation.
#
# Standalone by design: separate schedule, separate failure domain.
# If the scanner fails, the monitor still runs, and vice versa.

name: TMB Newsroom Monitor

on:
  schedule:
    - cron: '0 4 * * 3'  # Every Wednesday at 4am UTC
  workflow_dispatch:       # Manual trigger for testing
    inputs:
      dry_run:
        description: 'Run in dry-run mode (parse only, no DB writes)'
        required: false
        default: 'false'
        type: boolean

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SES_SMTP_HOST: ${{ secrets.SES_SMTP_HOST }}
  SES_SMTP_USER: ${{ secrets.SES_SMTP_USER }}
  SES_SMTP_PASS: ${{ secrets.SES_SMTP_PASS }}
  SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL }}
  NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}

jobs:
  tmb-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TMB newsroom monitor
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npx ts-node scripts/run-tmb-monitor.ts --dry-run
          else
            npx ts-node scripts/run-tmb-monitor.ts
          fi

      - name: Report results
        if: always()
        run: |
          echo "TMB newsroom monitor completed at $(date -u)"
          echo "Next scheduled run: next Wednesday at 4am UTC"
