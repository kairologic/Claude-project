<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KairoLogic Corrections Assistant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 360px;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #fafafa;
        color: #0f1e2e;
      }

      .container {
        padding: 16px;
      }

      .header {
        background: #0f1e2e;
        color: #d4a017;
        padding: 16px;
        margin: -16px -16px 16px -16px;
        border-radius: 4px 4px 0 0;
        text-align: center;
      }

      .header h1 {
        font-size: 16px;
        margin-bottom: 4px;
      }

      .header .subtitle {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.8);
      }

      .section {
        margin-bottom: 20px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #0f1e2e;
        margin-bottom: 10px;
      }

      .form-group {
        margin-bottom: 12px;
      }

      label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
        color: #5a6472;
        font-weight: 500;
      }

      input[type='email'],
      input[type='password'],
      input[type='url'] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d8e0;
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      input[type='email']:focus,
      input[type='password']:focus,
      input[type='url']:focus {
        outline: none;
        border-color: #d4a017;
        box-shadow: 0 0 0 2px rgba(212, 160, 23, 0.1);
      }

      button {
        width: 100%;
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: #0f1e2e;
        color: #d4a017;
        border: 1px solid #d4a017;
      }

      .btn-primary:hover {
        background: #1a3249;
        box-shadow: 0 0 12px rgba(212, 160, 23, 0.3);
      }

      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: #f4f5f7;
        color: #5a6472;
      }

      .btn-secondary:hover {
        background: #e8eaed;
      }

      .status {
        padding: 12px;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }

      .status.success {
        background: #e6f7f2;
        color: #1a9e6d;
        border: 1px solid #1a9e6d;
        display: block;
      }

      .status.error {
        background: #fdeeee;
        color: #d64545;
        border: 1px solid #d64545;
        display: block;
      }

      .status.info {
        background: #eef4ff;
        color: #185fa5;
        border: 1px solid #185fa5;
        display: block;
      }

      .authenticated-view {
        display: none;
      }

      .authenticated-view.show {
        display: block;
      }

      .login-view {
        display: block;
      }

      .login-view.hide {
        display: none;
      }

      .connection-info {
        background: #eef4ff;
        border: 1px solid #185fa5;
        border-radius: 6px;
        padding: 12px;
        font-size: 12px;
        color: #185fa5;
        margin-bottom: 16px;
      }

      .connection-info .status-icon {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #1a9e6d;
        border-radius: 50%;
        margin-right: 6px;
      }

      .connection-info .status-text {
        font-weight: 600;
      }

      .provider-display {
        background: #f4f5f7;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 16px;
        font-size: 13px;
      }

      .provider-display .label {
        color: #9aa3ae;
        margin-bottom: 4px;
        font-size: 11px;
        text-transform: uppercase;
      }

      .provider-display .value {
        color: #0f1e2e;
        font-weight: 600;
        font-size: 14px;
        word-break: break-all;
      }

      .footer {
        border-top: 1px solid #d1d8e0;
        padding-top: 12px;
        margin-top: 16px;
        font-size: 11px;
        color: #9aa3ae;
        text-align: center;
      }

      .button-group {
        display: flex;
        gap: 8px;
      }

      .button-group button {
        flex: 1;
      }

      .config-section {
        background: #f4f5f7;
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .config-section .section-title {
        margin-top: 0;
        margin-bottom: 8px;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(212, 160, 23, 0.3);
        border-top: 2px solid #d4a017;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>KairoLogic</h1>
      <div class="subtitle">Corrections Assistant</div>
    </div>

    <div class="container">
      <!-- Status messages -->
      <div id="status-message" class="status"></div>

      <!-- Login View -->
      <div id="login-view" class="login-view">
        <div class="section">
          <div class="section-title">Sign In</div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>

          <div class="config-section">
            <div class="section-title">API Configuration</div>
            <div class="form-group">
              <label for="api-base-url">API Base URL</label>
              <input
                type="url"
                id="api-base-url"
                placeholder="https://app.kairologic.com"
                value="https://app.kairologic.com"
              />
            </div>
          </div>

          <button id="login-btn" class="btn-primary">
            <span id="login-btn-text">Sign In</span>
          </button>
        </div>

        <div class="footer">
          <p>
            Authenticate with KairoLogic to view pending provider corrections across healthcare
            systems.
          </p>
        </div>
      </div>

      <!-- Authenticated View -->
      <div id="authenticated-view" class="authenticated-view">
        <div class="connection-info">
          <span class="status-icon"></span>
          <span class="status-text">Connected</span>
        </div>

        <div class="provider-display">
          <div class="label">Currently Viewing Provider</div>
          <div class="value" id="current-npi">Detecting NPI...</div>
        </div>

        <div class="section">
          <div class="section-title">Account</div>
          <div style="font-size: 13px; color: #5a6472; margin-bottom: 12px">
            <strong id="auth-email"></strong>
          </div>
          <button id="logout-btn" class="btn-secondary">Sign Out</button>
        </div>

        <div class="footer">
          <p>Open any supported payer portal to view pending corrections.</p>
          <p style="margin-top: 8px; font-size: 10px">
            Last updated: <span id="last-updated">never</span>
          </p>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
